# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Yachika Anand
description: "AI Engineer and Data Solutions Architect building production GenAI, RAG systems, and governed data platforms. I write on Medium and Substack about AI engineering, data pipelines, and lessons from building real systems. 6+ years across AI, data engineering, teaching, and applied ML."
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

collections:
  projects:
    output: true
    permalink: /projects/:title/

#-------------------------------
# About Section
subtitle: AI Engineer <span style="color:#f58506"> | GenAI, RAG & Writer </span>
avatar_image: "img/profile_pic.png"

#-------------------------------
# Contact links
linkedln: "https://www.linkedin.com/in/yachikanand/" # Add your linkedln handle
github: "https://github.com/yachika-yashu"  # Add your github handle
email: "yachikanand@gmail.com"

paginate: 6
paginate_path: "/blog/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false


