# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Yachika Anand
description: "Data Solutions Architect — building production-ready AI systems, ML pipelines, and data solutions that are traceable, reproducible, and ready for real users. 6+ years across machine learning, deep learning, RAG systems, MLOps, cloud architecture, and analytics, focused on turning data into scalable, reliable intelligence.<br>
I design end-to-end systems that bridge raw data with production-grade AI applications.<br>
I prioritize scalability, observability, and reproducibility in every pipeline I build.<br>
My work spans experimentation to deployment, ensuring models perform reliably in real environments.<br>
I believe strong data systems are not just built — they are engineered to evolve with the business."
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

collections:
  projects:
    output: true
    permalink: /projects/:title/

#-------------------------------
# About Section
subtitle: Data Science <span style="color:#f58506"> Portfolio </span>
resume_url: "docs/Yachika_Anand_Resume.pdf"
avatar_image: "img/profile_pic.png"

#-------------------------------
# Contact links
linkedln: "https://www.linkedin.com/in/yachikanand/" # Add your linkedln handle
github: "https://github.com/yachika-yashu"  # Add your github handle
email: "yachikanand@gmail.com"

paginate: 6
paginate_path: "/blog/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false


